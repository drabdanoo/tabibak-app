appId: com.abdullah.reacttabibok
---

# ── Auto-injected login (receptionist) ──────────────────────
- clearState
- launchApp
- waitForAnimationToEnd
- assertVisible: "Choose your role to continue"
- waitForAnimationToEnd
- tapOn:
    id: "role-card-receptionist"
- waitForAnimationToEnd
- assertVisible: "Email Address"
- tapOn: "Enter your email"
- inputText: ${TEST_RECEPTIONIST_EMAIL}
- tapOn: "Enter your password"
- inputText: ${TEST_PASSWORD}
- tapOn: "Sign In"
- waitForAnimationToEnd
# ── End login ────────────────────────────────────────────────────────

- takeScreenshot: "receptionist_dashboard"
- assertVisible: "Dashboard"
- tapOn: "Register Patient"
- waitForAnimationToEnd
- assertVisible: "New Patient Registration"
- takeScreenshot: "registration_screen_loaded"
- waitForAnimationToEnd
- tapOn: "full_name_input"
- inputText: "John Doe"
- tapOn: "phone_input"
- eraseText: 50
- inputText: "5559876543"
- tapOn: "email_input"
- inputText: "john@test.com"
- waitForAnimationToEnd
- tapOn: "Date of Birth"
- waitForAnimationToEnd
- tapOn: "1990-01-15"
- tapOn: "Gender"
- waitForAnimationToEnd
- tapOn: "Male"
- tapOn: "address_input"
- inputText: "123 Main St"
- tapOn: "Submit Registration"
- waitForAnimationToEnd
- assertVisible: "Registration Successful"
- takeScreenshot: "registration_success"