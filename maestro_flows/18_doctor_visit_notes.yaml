appId: com.abdullah.reacttabibok
---

# ── Auto-injected login (doctor) ──────────────────────
- clearState
- launchApp
- waitForAnimationToEnd
- assertVisible: "Choose your role to continue"
- waitForAnimationToEnd
- tapOn:
    id: "role-card-doctor"
- waitForAnimationToEnd
- assertVisible: "Email Address"
- tapOn: "Enter your email"
- inputText: ${TEST_DOCTOR_EMAIL}
- tapOn: "Enter your password"
- inputText: ${TEST_PASSWORD}
- tapOn: "Sign In"
- waitForAnimationToEnd
# ── End login ────────────────────────────────────────────────────────

- assertVisible: "Appointments"
- tapOn: "Appointments"
- waitForAnimationToEnd
- tapOn:
    index: 0
- waitForAnimationToEnd
- assertVisible: "Patient Details"
- tapOn: "Add Visit Notes"
- waitForAnimationToEnd
- assertVisible: "Visit Notes"
- takeScreenshot: "visit_notes_screen"
- tapOn: "Enter diagnosis notes..."
- inputText: "Patient presented with high fever. Prescribed rest and medication."
- back
- tapOn: "Enter prescription details..."
- inputText: "Patient presented with high fever. Prescribed rest and medication."
- back
- tapOn: "Complete Visit"
- waitForAnimationToEnd
- assertVisible: "Success"
- assertVisible: "Visit completed successfully!"
- takeScreenshot: "notes_saved_confirmation"
- tapOn: "OK"
- waitForAnimationToEnd