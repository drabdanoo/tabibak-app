appId: com.abdullah.reacttabibok
---

# ── Auto-injected login (doctor) ──────────────────────
- clearState
- launchApp
- waitForAnimationToEnd
- assertVisible: "Choose your role to continue"
- waitForAnimationToEnd
- tapOn:
    id: "role-card-doctor"
- waitForAnimationToEnd
- assertVisible: "Email Address"
- tapOn: "Enter your email"
- inputText: ${TEST_DOCTOR_EMAIL}
- tapOn: "Enter your password"
- inputText: ${TEST_PASSWORD}
- tapOn: "Sign In"
- waitForAnimationToEnd
# ── End login ────────────────────────────────────────────────────────

- tapOn: "Chat"
- waitForAnimationToEnd
- assertVisible: "Your conversations"
- tapOn:
    index: 0
- waitForAnimationToEnd

- tapOn: "message_input"
- inputText: "Hello doctor, I have a question"
- tapOn: "Send"
- assertVisible: "Hello doctor, I have a question"
- takeScreenshot: "patient_message_sent"