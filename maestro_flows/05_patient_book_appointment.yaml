appId: com.abdullah.reacttabibok
---

# ── Auto-injected login (doctor) ──────────────────────
- clearState
- launchApp
- waitForAnimationToEnd
- assertVisible: "Choose your role to continue"
- waitForAnimationToEnd
- tapOn:
    id: "role-card-doctor"
- waitForAnimationToEnd
- assertVisible: "Email Address"
- tapOn: "Enter your email"
- inputText: ${TEST_DOCTOR_EMAIL}
- tapOn: "Enter your password"
- inputText: ${TEST_PASSWORD}
- tapOn: "Sign In"
- waitForAnimationToEnd
# ── End login ────────────────────────────────────────────────────────

- assertVisible: "Find Doctors"
- tapOn: "Find Doctors"
- waitForAnimationToEnd
- takeScreenshot: "patient_doctor_list_screen"
- tapOn:
    index: 0
- waitForAnimationToEnd
- assertVisible: "Book Appointment"
- takeScreenshot: "doctor_details_screen"
- tapOn: "Book Appointment"
- waitForAnimationToEnd
- takeScreenshot: "booking_screen_loaded"
- tapOn:
    index: 2
- waitForAnimationToEnd
- tapOn:
    index: 0
- waitForAnimationToEnd
- tapOn: "Symptoms"
- inputText: "Fever and cough"
- tapOn: "Confirm Booking"
- waitForAnimationToEnd
- assertVisible: "Booking Confirmed"
- takeScreenshot: "booking_confirmed"