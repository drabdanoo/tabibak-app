appId: com.abdullah.reacttabibok
---

# ── Auto-injected login (doctor) ──────────────────────
- clearState
- launchApp
- waitForAnimationToEnd
- assertVisible: "Choose your role to continue"
- waitForAnimationToEnd
- tapOn:
    id: "role-card-doctor"
- waitForAnimationToEnd
- assertVisible: "Email Address"
- tapOn: "Enter your email"
- inputText: ${TEST_DOCTOR_EMAIL}
- tapOn: "Enter your password"
- inputText: ${TEST_PASSWORD}
- tapOn: "Sign In"
- waitForAnimationToEnd
# ── End login ────────────────────────────────────────────────────────

- assertVisible: "Appointments"
- tapOn: "Appointments"
- waitForAnimationToEnd
- tapOn:
    index: 0
- waitForAnimationToEnd
- assertVisible: "Patient Details"
- scrollUntilVisible:
    element: "View EMR"
    timeout: 5000
- tapOn: "View EMR"
- waitForAnimationToEnd
- assertVisible: "Electronic Medical Record"
- takeScreenshot: "emr_screen_loaded"
- scrollUntilVisible:
    element: "Past Visits"
    timeout: 5000
- assertVisible: "Past Visits"
- takeScreenshot: "past_visits_section"
- tapOn:
    index: 0
- waitForAnimationToEnd
- assertVisible: "Visit Notes"
- assertVisible: "Prescriptions"
- takeScreenshot: "visit_details_expanded"

- back
- back