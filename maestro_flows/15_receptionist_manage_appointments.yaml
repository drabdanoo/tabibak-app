appId: com.abdullah.reacttabibok
---

# ── Auto-injected login (receptionist) ──────────────────────
- clearState
- launchApp
- waitForAnimationToEnd
- assertVisible: "Choose your role to continue"
- waitForAnimationToEnd
- tapOn:
    id: "role-card-receptionist"
- waitForAnimationToEnd
- assertVisible: "Email Address"
- tapOn: "Enter your email"
- inputText: ${TEST_RECEPTIONIST_EMAIL}
- tapOn: "Enter your password"
- inputText: ${TEST_PASSWORD}
- tapOn: "Sign In"
- waitForAnimationToEnd
# ── End login ────────────────────────────────────────────────────────

- takeScreenshot: "receptionist_dashboard"
- assertVisible: "Dashboard"
- waitForAnimationToEnd
- scrollUntilVisible:
    element: "Manage Appointments"
    direction: DOWN
- tapOn: "Manage Appointments"
- waitForAnimationToEnd
- assertVisible: "Appointment Management"
- takeScreenshot: "appointment_management_screen"
- tapOn: "Filter"
- waitForAnimationToEnd
- tapOn: "Today"
- waitForAnimationToEnd
- assertVisible: "Today"
- takeScreenshot: "today_filter_applied"
- scrollUntilVisible:
    element: "First Appointment"
    direction: DOWN
- tapOn: "First Appointment"
- waitForAnimationToEnd
# Changed from tapOn: "Status" to use the correct accessibility identifier
- tapOn:
    id: "appointment-status-filter"
- waitForAnimationToEnd
- scrollUntilVisible:
    element: "Confirmed"
    direction: DOWN
- tapOn: "Confirmed"
- waitForAnimationToEnd
- scrollUntilVisible:
    element: "Save Changes"
    direction: DOWN
- tapOn: "Save Changes"
- waitForAnimationToEnd
- assertVisible: "Status Updated"
- takeScreenshot: "appointment_status_confirmed"