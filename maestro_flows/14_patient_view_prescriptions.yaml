appId: com.abdullah.reacttabibok
---

# ── Auto-injected login (doctor) ──────────────────────
- clearState
- launchApp
- waitForAnimationToEnd
- assertVisible: "Choose your role to continue"
- waitForAnimationToEnd
- tapOn:
    id: "role-card-doctor"
- waitForAnimationToEnd
- assertVisible: "Email Address"
- tapOn: "Enter your email"
- inputText: ${TEST_DOCTOR_EMAIL}
- tapOn: "Enter your password"
- inputText: ${TEST_PASSWORD}
- tapOn: "Sign In"
- waitForAnimationToEnd
# ── End login ────────────────────────────────────────────────────────

- waitForAnimationToEnd
- tapOn: "Menu"
- waitForAnimationToEnd
- tapOn: "Prescriptions"
- waitForAnimationToEnd
- assertVisible: "Prescription Inbox"
- takeScreenshot: "prescription_list"
# Scroll down to find prescription items (they might be lower in the list)
- swipe:
    direction: UP
    duration: 1000
- swipe:
    direction: UP
    duration: 1000
- waitForAnimationToEnd
# Tap on the first prescription by index
- tapOn:
    index: 0
- waitForAnimationToEnd
- assertVisible: "Prescription"
- takeScreenshot: "prescription_detail"