appId: com.abdullah.reacttabibok
---

# ── Auto-injected login (doctor) ──────────────────────
- clearState
- launchApp
- waitForAnimationToEnd
- assertVisible: "Choose your role to continue"
- waitForAnimationToEnd
- tapOn:
    id: "role-card-doctor"
- waitForAnimationToEnd
- assertVisible: "Email Address"
- tapOn: "Enter your email"
- inputText: ${TEST_DOCTOR_EMAIL}
- tapOn: "Enter your password"
- inputText: ${TEST_PASSWORD}
- tapOn: "Sign In"
- waitForAnimationToEnd
# ── End login ────────────────────────────────────────────────────────

- assertVisible: "Appointments"
- tapOn: "Appointments"
- waitForAnimationToEnd
- takeScreenshot: "appointments_list_visible"
- assertVisible: "Appointments"
- tapOn:
    index: 0
- waitForAnimationToEnd
- assertVisible: "Patient Details"
- assertVisible: "john smith"
- takeScreenshot: "patient_details_loaded"
- assertVisible: "Medical History"
- swipe:
    direction: UP
    duration: 500
- waitForAnimationToEnd
- assertVisible: "Allergies"
- takeScreenshot: "allergies_section_visible"