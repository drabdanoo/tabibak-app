appId: com.abdullah.reacttabibok
---

# ── Auto-injected login (patient flows: logging in as Doctor — patient phone auth not automatable) ──────────────────────
- clearState
- launchApp
- waitForAnimationToEnd
- assertVisible: "Choose your role to continue"
- waitForAnimationToEnd
- tapOn:
    id: "role-card-doctor"
- waitForAnimationToEnd
- assertVisible: "Email Address"
- tapOn: "Enter your email"
- inputText: ${TEST_DOCTOR_EMAIL}
- tapOn: "Enter your password"
- inputText: ${TEST_PASSWORD}
- tapOn: "Sign In"
- waitForAnimationToEnd
# ── End login ────────────────────────────────────────────────────────

- takeScreenshot: "doctor_home_screen"
- waitForAnimationToEnd
- takeScreenshot: "doctor_dashboard_loaded"