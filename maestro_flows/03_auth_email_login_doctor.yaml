appId: com.abdullah.reacttabibok
---
- clearState
- launchApp
- waitForAnimationToEnd
# Handle possible iOS permission alerts on first launch
- runFlow:
    when:
      visible: "Allow"
    commands:
      - tapOn: "Allow"
      - waitForAnimationToEnd
- runFlow:
    when:
      visible: "Don’t Allow"
    commands:
      - tapOn: "Don’t Allow"
      - waitForAnimationToEnd
- runFlow:
    when:
      visible: "OK"
    commands:
      - tapOn: "OK"
      - waitForAnimationToEnd
- assertVisible: "Choose your role to continue"
- waitForAnimationToEnd
# Try tapping Doctor by text, then by index as fallback
- tapOn: "Doctor"
- waitForAnimationToEnd
- runFlow:
    when:
      visible: "Choose your role to continue"
    commands:
      - tapOn:
          index: 1
      - waitForAnimationToEnd
# Email login screen
- assertVisible: "Email Address"
- tapOn: "Enter your email"
- inputText: ${TEST_DOCTOR_EMAIL}
- tapOn: "Enter your password"
- inputText: ${TEST_PASSWORD}
- tapOn: "Sign In"
- waitForAnimationToEnd
- takeScreenshot: "doctor_after_signin"


