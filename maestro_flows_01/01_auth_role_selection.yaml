appId: com.abdullah.reacttabibok
---
- clearState
- launchApp
- waitForAnimationToEnd
# Handle possible iOS permission alerts on first launch
- runFlow:
    when:
      visible: "Allow"
    commands:
      - tapOn: "Allow"
      - waitForAnimationToEnd
- runFlow:
    when:
      visible: "Don’t Allow"
    commands:
      - tapOn: "Don’t Allow"
      - waitForAnimationToEnd
- runFlow:
    when:
      visible: "OK"
    commands:
      - tapOn: "OK"
      - waitForAnimationToEnd
- assertVisible: "Choose your role to continue"
- takeScreenshot: "role_selection_screen"
- waitForAnimationToEnd

# Prefer id; fallback to text (both English/Arabic handled by text match)
- runFlow:
    when:
      visible:
        id: "role-card-patient"
    commands:
      - tapOn:
          id: "role-card-patient"
      - waitForAnimationToEnd
- runFlow:
    when:
      visible: "Patient"
    commands:
      - tapOn: "Patient"
      - waitForAnimationToEnd

# Arrived at Phone Auth screen
- takeScreenshot: "phone_auth_screen"
